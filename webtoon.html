<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>평안나사렛 웹툰 | 평생순장, 캠퍼스, 그리고 나사렛</title>
<meta name="description" content="캠퍼스에서 시작된 믿음이 삶 전체로 이어지는 과정을 10개의 핵심 페이지로 정리한 평안 CCC 나사렛 웹툰">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --card: #16161f;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --text: #f0f0f8;
    --muted: #8888aa;
    --border: rgba(124,106,247,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* 헤더 */
  header {
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    flex-wrap: wrap; gap: 12px;
  }
  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .back-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 8px 18px; border-radius: 100px;
    font-size: 0.8rem; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    text-decoration: none; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 페이지 카운터 */
  .page-counter {
    text-align: center; padding: 1.5rem;
    font-size: 0.8rem; color: var(--muted); letter-spacing: 1px;
  }
  .page-counter span {
    background: rgba(124,106,247,0.15); border: 1px solid var(--border);
    padding: 4px 14px; border-radius: 100px;
    color: var(--accent); font-weight: 600;
  }

  /* 이미지 뷰어 */
  .viewer {
    max-width: 700px; margin: 0 auto; padding: 0 1rem 4rem;
  }
  .page-wrap {
    margin-bottom: 2rem; border-radius: 20px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    position: relative;
  }
  .page-wrap img {
    width: 100%; display: block;
    transition: opacity 0.3s;
  }
  .page-num {
    position: absolute; top: 16px; right: 16px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
    color: #fff; font-size: 0.75rem; font-weight: 700;
    padding: 4px 12px; border-radius: 100px; letter-spacing: 1px;
  }

  /* 하단 버튼 */
  .bottom-nav {
    text-align: center; padding: 2rem;
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; padding: 14px 36px; border-radius: 100px;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    text-decoration: none; display: inline-block;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-2px); }
  .bottom-desc { font-size: 0.8rem; color: var(--muted); margin-top: 1rem; }
</style>
</head>
